<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accounts | LedgerBank</title>

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/animations.css">



<script src="./js/config.js"></script>
<script src="./js/api.js"></script>
<script src="./js/transfer.js"></script>
<style>

.accounts-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.accounts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:25px;
}

.account-card{

    background:linear-gradient(
        135deg,
        #171923,
        #1f2230
    );

    border:1px solid var(--border);

    border-radius:24px;

    padding:30px;

    position:relative;

    overflow:hidden;

    transition:.3s;
}

.account-card:hover{
    transform:translateY(-5px);
}

.account-type{
    color:var(--text-secondary);
    font-size:.9rem;
}

.account-balance{
    font-size:2.5rem;
    font-weight:700;
    margin:20px 0;
    color:var(--success);
}

.account-id{
    color:var(--text-secondary);
    word-break:break-all;
    font-size:.8rem;
}

.empty-state{
    text-align:center;
    padding:50px;
    color:var(--text-secondary);
}

.loading{
    text-align:center;
    padding:40px;
    color:var(--text-secondary);
}

.top-glow{

    position:absolute;

    width:150px;
    height:150px;

    background:rgba(79,140,255,.15);

    border-radius:50%;

    top:-60px;
    right:-60px;
}

</style>

</head>
<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">
            LedgerBank
        </div>

        <div class="sidebar-menu">

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="accounts.html">
                Accounts
            </a>

            <a href="transfer.html">
                Transfer Money
            </a>

            <a href="transactions.html">
                Transactions
            </a>

            <a href="profile.html">
                Profile
            </a>

        </div>

    </aside>

    <main class="main-content">

        <div class="accounts-header">

            <div>

                <h1>
                    Your Accounts
                </h1>

                <p
                style="
                color:var(--text-secondary);
                margin-top:10px;
                ">
                    Manage your banking accounts
                </p>

            </div>

            <button
                class="btn btn-primary"
                id="createAccountBtn"
            >
                + New Account
            </button>

        </div>
        <div
            style="
            display:flex;
            gap:20px;
            margin-bottom:30px;
            flex-wrap:wrap;
            "
        >

            <div class="card">

                <h3>Total Accounts</h3>

                <h1 id="totalAccounts">
                    0
                </h1>

            </div>

            <div class="card">

                <h3>Total Balance</h3>

                <h1 id="totalBalance">
                    ₹0
                </h1>

            </div>

        </div>
        <div id="accountsContainer">

            <div class="loading">
                Loading Accounts...
            </div>

        </div>

    </main>

</div>
<script src="./js/api.js"></script>
<script src="./js/accounts.js"></script>

</body>
</html>
