<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | LedgerBank</title>

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/animations.css">



<script src="./js/config.js"></script>
<script src="./js/api.js"></script>
<script src="./js/transfer.js"></script>
<style>

.profile-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.profile-card,
.stats-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:30px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:linear-gradient(
        135deg,
        var(--primary),
        #6d5dfc
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:2rem;
    font-weight:700;

    margin-bottom:20px;
}

.profile-item{
    margin-bottom:20px;
}

.profile-label{
    color:var(--text-secondary);
    margin-bottom:6px;
}

.profile-value{
    font-size:1.1rem;
    font-weight:600;
}

.stat-box{
    background:var(--card-hover);
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.stat-box h3{
    margin-bottom:10px;
}

.stat-value{
    font-size:1.8rem;
    font-weight:700;
    color:var(--success);
}

.action-buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

@media(max-width:900px){

    .profile-grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>
<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">
            LedgerBank
        </div>

        <div class="sidebar-menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="accounts.html">Accounts</a>
            <a href="transfer.html">Transfer Money</a>
            <a href="transactions.html">Transactions</a>
            <a href="profile.html">Profile</a>
        </div>

    </aside>

    <main class="main-content">

        <h1 style="margin-bottom:30px;">
            Profile
        </h1>

        <div class="profile-grid">

            <!-- Profile Information -->

            <div class="profile-card">

                <div class="avatar" id="avatar">
                    U
                </div>

                <div class="profile-item">

                    <div class="profile-label">
                        Full Name
                    </div>

                    <div
                        class="profile-value"
                        id="userName"
                    >
                        Loading...
                    </div>

                </div>

                <div class="profile-item">

                    <div class="profile-label">
                        Email Address
                    </div>

                    <div
                        class="profile-value"
                        id="userEmail"
                    >
                        Loading...
                    </div>

                </div>

                <div class="profile-item">

                    <div class="profile-label">
                        User ID
                    </div>

                    <div
                        class="profile-value"
                        id="userId"
                        style="
                        word-break:break-all;
                        font-size:.9rem;
                        "
                    >
                    </div>

                </div>

                <div class="action-buttons">

                    <button
                        class="btn btn-secondary"
                        onclick="window.location.href='accounts.html'"
                    >
                        View Accounts
                    </button>

                    <button
                        class="btn btn-primary"
                        onclick="window.location.href='transfer.html'"
                    >
                        Transfer Money
                    </button>

                </div>

            </div>

            <!-- Stats -->

            <div class="stats-card">

                <div class="stat-box">

                    <h3>
                        Accounts
                    </h3>

                    <div
                        class="stat-value"
                        id="accountCount"
                    >
                        0
                    </div>

                </div>

                <div class="stat-box">

                    <h3>
                        Total Balance
                    </h3>

                    <div
                        class="stat-value"
                        id="totalBalance"
                    >
                        ₹0
                    </div>

                </div>

                <button
                    class="btn"
                    id="logoutBtn"
                    style="
                    width:100%;
                    background:var(--danger);
                    color:white;
                    margin-top:10px;
                    "
                >
                    Logout
                </button>

            </div>

        </div>

    </main>

</div>

<script src="./js/api.js"></script>
<script src="./js/profile.js"></script>

</body>
</html>
